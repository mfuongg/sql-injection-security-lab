<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xác thực 2FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="surface-card">
                <div class="section-kicker">XÁC THỰC HAI LỚP</div>
                <h1 class="section-title">Xác nhận đăng nhập</h1>
                <p class="text-muted">Tài khoản: <strong th:text="${maskedAccount}"></strong></p>
                <div th:if="${error}" class="alert alert-danger rounded-4" th:text="${error}"></div>
                <form method="post" th:action="@{/2fa/verify}" class="vstack gap-3 mt-3">
                    <input type="hidden" name="csrfToken" th:value="${csrfToken}">
                    <div>
                        <label class="form-label">Mã OTP</label>
                        <input type="text" name="code" class="form-control" maxlength="6" pattern="\d{6}" required>
                    </div>
                    <button class="btn btn-primary rounded-4">Xác nhận</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
